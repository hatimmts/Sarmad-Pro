<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاتصال بالشبكة — سرمد</title>
<link rel="stylesheet" href="style.css">
<style>
.hero{background:#1e293b;padding:40px;border-radius:20px}
.bigbtn{display:block;margin:20px auto;padding:16px 28px;
background:#16a34a;color:#fff;font-size:20px;
border-radius:14px;text-decoration:none;width:fit-content}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:30px}
.card{background:#0f172a;padding:18px;border-radius:14px;border:1px solid #334155}
.stat{font-size:22px;margin-top:6px}
.btn{display:inline-block;margin:6px;padding:10px 16px;border-radius:10px;background:#2563eb;color:#fff;text-decoration:none}
</style>
</head>

<body>
<div class="container">

<h1>🚀 الانضمام إلى شبكة سرمد</h1>

<div class="hero">
  <p>اتصل بالشبكة الرئيسية بضغطة واحدة</p>
  <a class="bigbtn" href="sarmad://connect">اتصال فوري بالشبكة</a>
</div>

<div class="grid">
  <div class="card">
    <div>حالة الشبكة</div>
    <div class="stat">🟢 تعمل</div>
  </div>
  <div class="card">
    <div>البلوك الحالي</div>
    <div class="stat">#523</div>
  </div>
  <div class="card">
    <div>العقد المتصلة</div>
    <div class="stat">128 عقدة</div>
  </div>
</div>

<div style="margin-top:30px">
  <a class="btn" href="#">📱 فتح التطبيق</a>
  <a class="btn" href="#">⬇️ تحميل التطبيق</a>
  <a class="btn" href="#">🔗 نسخ رابط الدعوة</a>
</div>

<div style="margin-top:40px">
  <a href="index.html">⬅ العودة للرئيسية</a>
</div>

</div>
</body>
</html>
